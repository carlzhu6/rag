server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: aiagent
    password: aiagent123
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# LangChain4j 配置
langchain4j:
  ollama:
    chat-model:
      model-name: qwen2.5:1.5b
      base-url: http://localhost:11434
      temperature: 0.7
      num-predict: 2048

# AI Agent 自定义配置
ai-agent:
  # Milvus 配置
  milvus:
    host: localhost
    port: 19530
    collection-name: knowledge_base
    dimension: 768

  # 文档处理配置
  document:
    upload-dir: D:/code/vscodetest/ai-agent/uploads
    chunk-size: 500
    chunk-overlap: 50

  # JWT 配置
  jwt:
    secret: AIGentSecretKey2024VeryLongSecretKeyForJwtTokenGeneration
    expiration: 86400000  # 24小时
